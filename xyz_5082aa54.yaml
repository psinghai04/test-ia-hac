- name: Apply security update and restrict HTTP services
  hosts: windows_servers
  become: yes
  tasks:
    - name: Download and install security update MS15-034
      win_reboot:
        update: MS15-034
        reboot: yes

    - name: Create inbound firewall rule to block HTTP services
      win_firewall_rule:
        name: "Block HTTP Services"
        description: "Blocks all incoming connections to HTTP services on port 80"
        protocol: TCP
        localport: 80
        action: Block
        profile: Public,Private
        state: present